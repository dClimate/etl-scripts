[project]
name = "etl-scripts"
requires-python = ">=3.11"

# numcodecs, dask, pandas, numpy, and multiformats are imports in various files, but they are not in the pyproject.toml dependencies since they are required by xarray, so we just use the existing compatible versions that are installed when xarray is installed
dependencies = [
    "xarray[io,parallel]",
    "ipldstore @ git+https://github.com/dClimate/ipldstore@v2.1.3",
]

[project.optional-dependencies]
dev = [
    "ruff",
    "pre-commit"
]
# This is required for an ETL of CYCLOPS data, the scripts for which dClimate will not be open-sourcing at this time
cyclops = [
    "boto3"
]
